# Pillar 1 — Key Control & Exit
pillar_1:
  "1a":                  # Unilateral exit path
    score: 80
    source_url: "https://help.unchained.com/what-is-caravan"
    excerpt: "Caravan is Unchained's stateless, open-source multisig wallet tool. Caravan was designed as a recovery tool for vaults and loans; Unchained clients can use the tool to retain full access to their bitcoin in the case that Unchained services are down or no longer exist."
    tier: T4
    retrieved_at: "2026-06-13"
  "1b":                  # Quorum architecture
    score: 100
    source_url: "https://help.unchained.com/what-is-loan-collateral-and-what-does-unchained-do-with-it"
    excerpt: "Bitcoin associated with loan collateral is stored in multisignature addresses within a 2-of-3 quorum using private keys held by the Key Agent, Unchained, and the borrower. To move any bitcoin stored at an address, two of the three keys will be required to sign."
    tier: T3
    retrieved_at: "2026-06-13"
  "1c":                  # Failure recovery
    score: 80
    source_url: "https://help.unchained.com/loan-unchained-does-not-exist"
    excerpt: "Your loan will continue to be serviced, and your collateral will continue to be secured with keys. Unchained loans are serviced by Bitcoin Collateral Services LLC, a subsidiary that is bankruptcy remote from Unchained Capital, Inc. Any Unchained private keys securing bitcoin associated with loan collateral will be transferred to a new key agent who will assume the responsibilities of signing for future transactions as needed."
    tier: T3
    retrieved_at: "2026-06-13"
  "1d":                  # Legal claim quality (CeFi)
    score: 80
    source_url: "https://unchnd.co/trustagreement"
    excerpt: "Borrowers receive a Specified Unit of Beneficial Interest (SUBI) representing equitable title in specific bitcoin held under the UC Secured Assets Trust Series, a Delaware Statutory Trust. Each SUBI creates a separate series under 12 Del.C. 3806(b). Governed by Article 8 of the UCC; intended to be a 'security' under 6 Del.C. 8-102(a)(15)."
    tier: T3
    retrieved_at: "2026-06-13"

