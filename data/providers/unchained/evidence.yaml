# Pillar 1 — Key Control & Exit
pillar_1:
  "1a_arch":              # Architecture: multisig + Carawan — verifiable from code/on-chain
    score: 85
    source_url: "https://github.com/unchained-capital/caravan"
    excerpt: "Caravan is Unchained's open-source (MIT license) Bitcoin multisig coordination software. 2-of-3 collaborative custody with borrower key + Unchained key + Key Agent key. No single party can sign alone. Borrower + Key Agent can sign without Unchained."
    tier: T1
    retrieved_at: "2026-06-13"
  "1a_contract":           # Contractual right to exit mid-loan without provider cooperation
    score: 25
    source_url: "https://help.unchained.com/my-loan-is-ending.-what-happens-next"
    excerpt: "To pay off loan: send wire → Unchained processes → collateral released. To surrender collateral: Unchained sells at trading desk (best efforts, Mon-Fri 8AM-4PM CT). No script-enforced mid-loan unilateral exit path documented."
    tier: T3
    retrieved_at: "2026-06-13"
  "1b":                    # Quorum architecture
    score: 100
    source_url: "https://help.unchained.com/what-is-loan-collateral-and-what-does-unchained-do-with-it"
    excerpt: "2-of-3 quorum using private keys held by the Key Agent, Unchained, and the borrower. To move any bitcoin, two of the three keys are required."
    tier: T3
    retrieved_at: "2026-06-13"
  "1c":                    # Failure recovery
    score: 80
    source_url: "https://help.unchained.com/loan-unchained-does-not-exist"
    excerpt: "Your loan will continue to be serviced, and your collateral will continue to be secured with keys. Loans are serviced by Bitcoin Collateral Services LLC, a bankruptcy-remote subsidiary. Unchained private keys will be transferred to a new key agent."
    tier: T3
    retrieved_at: "2026-06-13"
  "1d":                    # Legal claim quality
    score: 80
    source_url: "https://unchnd.co/trustagreement"
    excerpt: "Borrowers receive a Specified Unit of Beneficial Interest (SUBI) representing equitable title in specific bitcoin held under the UC Secured Assets Trust Series, a Delaware Statutory Trust. Each SUBI creates a separate series under 12 Del.C. 3806(b). Purpose: bankruptcy-remote."
    tier: T3
    retrieved_at: "2026-06-13"

