<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,"Fira Sans","Droid Sans","Helvetica Neue",sans-serif;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f8f8f8;color:#1a1a1a;line-height:1.5}
main{text-align:center;max-width:420px;padding:2rem}
.wordmark{font-size:1.5rem;font-weight:600;letter-spacing:-0.015em;margin-bottom:0.625rem;color:#1a1a1a}
.wordmark span{color:#999}
.tagline{font-size:1rem;color:#555;margin-bottom:2rem;line-height:1.6}
.indicator{display:inline-flex;align-items:center;gap:0.5rem;padding:0.5rem 1rem;border:1px solid #e0e0e0;border-radius:999px;font-size:0.8125rem;color:#888}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#888;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.25}}
@media(prefers-color-scheme:dark){body{background:#121212;color:#e8e8e8}.wordmark{color:#e8e8e8}.wordmark span{color:#666}.tagline{color:#999}.indicator{border-color:#333;color:#777}.dot{background:#777}}
</style>
</head>
<body>
<main>
<div class="wordmark">Ledger<span>Ratings</span></div>
<p class="tagline">Independent ratings<br>for Bitcoin-backed loans.</p>
<div class="indicator"><span class="dot"></span>Coming soon</div>
</main>
</body>
